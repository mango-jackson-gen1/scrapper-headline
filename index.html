<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Top Hits of the Day</title>
</head>
<body>
  <h1>Top Hits of the Day</h1>
  <table id="data"><thead></thead><tbody></tbody></table>

  <script>
    const CSV_FILE = "baidu-scrape1.csv";

    fetch(CSV_FILE)
      .then(r => r.text())
      .then(text => {
        const rows = text.trim().split("\n").map(line => line.split(","));
        const header = rows.shift();

        document.querySelector("#data thead").innerHTML =
          "<tr>" + header.map(h => "<th>" + h + "</th>").join("") + "</tr>";

        document.querySelector("#data tbody").innerHTML = rows.map(cols =>
          "<tr>" + cols.map(c => "<td>" + c + "</td>").join("") + "</tr>"
        ).join("");
      });
  </script>
</body>
</html>
